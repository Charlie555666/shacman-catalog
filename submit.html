<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Download Record</title>
<script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
</head>
<body>
<script>
(function() {
  var CLOUDBASE_ENV = 'gengyanchao-d0gyzofwr69907e3c';

  var params = {};
  location.search.substring(1).split('&').forEach(function(p) {
    var pair = p.split('=');
    if (pair[0]) params[decodeURIComponent(pair[0])] = decodeURIComponent(pair[1] || '');
  });

  var TOKEN = params.token || '';

  function sendResult(status, data) {
    try {
      window.parent.postMessage({
        type: 'dl-submit-result',
        token: TOKEN,
        status: status,
        data: data
      }, '*');
    } catch(e) {}
    // Also write to body for debugging
    document.body.innerHTML = status === 'ok' ? 'OK ' + (data.id || '') : 'ERR: ' + (data.msg || '');
  }

  if (!params.name || !params.phone) {
    sendResult('error', { msg: 'Missing params' });
    return;
  }

  try {
    var app = cloudbase.init({ env: CLOUDBASE_ENV, region: 'ap-shanghai' });
    var db = app.database();

    app.auth({ persistence: 'local' })
      .anonymousAuthProvider()
      .signIn()
      .then(function() {
        return db.collection('pdf_downloads').add({
          name: params.name,
          phone: params.phone,
          company: params.company || '',
          country: params.country || '',
          model: params.model || '',
          pageUrl: params.ref || '',
          createdAt: new Date().toISOString()
        });
      })
      .then(function(res) {
        sendResult('ok', { id: res.id });
      })
      .catch(function(err) {
        sendResult('error', { msg: err.message || String(err) });
      });
  } catch(e) {
    sendResult('error', { msg: e.message });
  }
})();
</script>
</body>
</html>
