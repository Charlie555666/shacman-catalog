<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHACMAN Catalog — 下载记录后台</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f0f2f5;
    color: #1a1a2e;
    padding: 24px;
  }
  .container { max-width: 1400px; margin: 0 auto; }
  .header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
  }
  .header h1 { font-size: 22px; font-weight: 700; color: #0D1F3D; }
  .header .sub { font-size: 13px; color: #888; margin-top: 4px; }
  .stats {
    display: flex; gap: 16px; margin-bottom: 20px;
  }
  .stat-card {
    background: white; border-radius: 10px; padding: 18px 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06); flex: 1; min-width: 140px;
  }
  .stat-card .num { font-size: 28px; font-weight: 700; color: #C62828; }
  .stat-card .label { font-size: 12px; color: #888; margin-top: 4px; }
  .toolbar {
    display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center;
  }
  .btn {
    padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px;
    cursor: pointer; font-weight: 600; transition: all 0.2s;
  }
  .btn-primary { background: #0D1F3D; color: white; }
  .btn-primary:hover { background: #152a52; }
  .btn-outline { background: white; color: #0D1F3D; border: 1px solid #ccc; }
  .btn-outline:hover { border-color: #0D1F3D; }
  .btn-danger { background: #C62828; color: white; }
  .btn-danger:hover { background: #a52222; }
  .status-badge {
    display: inline-block; padding: 3px 10px; border-radius: 10px;
    font-size: 11px; font-weight: 600;
  }
  .status-ok { background: #e6f7e6; color: #2e7d32; }
  .status-err { background: #fde8e8; color: #c62828; }
  .status-loading { background: #e3f2fd; color: #1565c0; }
  table {
    width: 100%; border-collapse: collapse; background: white;
    border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  thead { background: #0D1F3D; color: white; }
  th { padding: 12px 14px; text-align: left; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  td { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid #eee; }
  tbody tr:hover { background: #f8f9fc; }
  tbody tr:nth-child(even) { background: #fafbfc; }
  tbody tr:nth-child(even):hover { background: #f0f2f8; }
  .empty { text-align: center; padding: 60px 20px; color: #999; }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }
  .count-badge {
    background: #C62828; color: white; font-size: 11px; padding: 2px 8px;
    border-radius: 10px; font-weight: 600; margin-left: 6px;
  }
  .filter-group {
    display: flex; gap: 8px; align-items: center;
  }
  .filter-group input, .filter-group select {
    padding: 7px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px;
  }
  .footer-note { text-align: center; color: #999; font-size: 11px; margin-top: 20px; }
  .auto-refresh { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #888; }
  .auto-refresh input { cursor: pointer; }
  @media (max-width: 768px) {
    body { padding: 12px; }
    .stats { flex-wrap: wrap; }
    .stat-card { min-width: 100px; padding: 12px 16px; }
    .stat-card .num { font-size: 22px; }
    table { font-size: 11px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>📥 下载记录后台</h1>
      <div class="sub">
        状态：<span id="conn-status" class="status-badge status-loading">连接中...</span>
        <span style="margin-left:12px;">环境：gengyanchao-d0gyzofwr69907e3c</span>
      </div>
    </div>
    <div class="toolbar">
      <button class="btn btn-primary" onclick="refreshData()">🔄 刷新</button>
      <label class="auto-refresh">
        <input type="checkbox" id="auto-refresh" onchange="toggleAutoRefresh()" />
        自动刷新 (30s)
      </label>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="num" id="stat-total">-</div>
      <div class="label">总下载次数</div>
    </div>
    <div class="stat-card">
      <div class="num" id="stat-today">-</div>
      <div class="label">今日下载</div>
    </div>
    <div class="stat-card">
      <div class="num" id="stat-countries">-</div>
      <div class="label">覆盖国家</div>
    </div>
  </div>

  <div class="toolbar">
    <div class="filter-group">
      <input type="text" id="filter-search" placeholder="搜索姓名/公司/车型..." oninput="renderTable()" style="width:200px;" />
      <select id="filter-country" onchange="renderTable()">
        <option value="">全部国家</option>
      </select>
    </div>
  </div>

  <div id="table-container">
    <div class="empty">
      <div class="icon">⏳</div>
      <div>正在加载数据...</div>
    </div>
  </div>

  <div class="footer-note">
    SHACMAN Catalog · 下载记录由 CloudBase 提供支持 · 数据实时更新
  </div>
</div>

<script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
<script>
var ENV_ID = 'gengyanchao-d0gyzofwr69907e3c';
var app = cloudbase.init({ env: ENV_ID, region: 'ap-shanghai' });
var db = app.database();
var _records = [];
var _autoRefreshTimer = null;

function setStatus(ok, text) {
  var el = document.getElementById('conn-status');
  el.textContent = text;
  el.className = 'status-badge ' + (ok ? 'status-ok' : 'status-err');
}

app.auth({ persistence: 'local' })
  .anonymousAuthProvider()
  .signIn()
  .then(function() {
    setStatus(true, '已连接');
    refreshData();
  })
  .catch(function(err) {
    setStatus(false, '连接失败');
    document.getElementById('table-container').innerHTML =
      '<div class="empty"><div class="icon">⚠️</div><div>连接失败：' + (err.message || err) + '</div></div>';
  });

function refreshData() {
  setStatus(true, '加载中...');
  document.getElementById('conn-status').className = 'status-badge status-loading';
  
  db.collection('pdf_downloads')
    .orderBy('createdAt', 'desc')
    .limit(500)
    .get()
    .then(function(res) {
      _records = res.data || [];
      setStatus(true, '已连接 (' + _records.length + ' 条)');
      updateStats();
      populateCountryFilter();
      renderTable();
    })
    .catch(function(err) {
      setStatus(false, '加载失败');
      document.getElementById('table-container').innerHTML =
        '<div class="empty"><div class="icon">⚠️</div><div>加载数据失败：' + (err.message || err) + '</div></div>';
    });
}

function updateStats() {
  document.getElementById('stat-total').textContent = _records.length;
  
  var today = new Date().toISOString().split('T')[0];
  var todayCount = _records.filter(function(r) { return r.createdAt && r.createdAt.startsWith(today); }).length;
  document.getElementById('stat-today').textContent = todayCount;
  
  var countries = new Set();
  _records.forEach(function(r) { if (r.country) countries.add(r.country); });
  document.getElementById('stat-countries').textContent = countries.size;
}

function populateCountryFilter() {
  var countries = new Set();
  _records.forEach(function(r) { if (r.country) countries.add(r.country); });
  var sorted = Array.from(countries).sort();
  var select = document.getElementById('filter-country');
  select.innerHTML = '<option value="">全部国家</option>';
  sorted.forEach(function(c) {
    select.innerHTML += '<option value="' + c + '">' + c + '</option>';
  });
}

function renderTable() {
  var searchText = document.getElementById('filter-search').value.toLowerCase();
  var countryFilter = document.getElementById('filter-country').value;
  
  var filtered = _records.filter(function(r) {
    if (countryFilter && r.country !== countryFilter) return false;
    if (searchText) {
      var text = (r.name + ' ' + r.company + ' ' + r.model + ' ' + r.country + ' ' + r.phone).toLowerCase();
      if (text.indexOf(searchText) === -1) return false;
    }
    return true;
  });
  
  if (filtered.length === 0) {
    document.getElementById('table-container').innerHTML = 
      '<div class="empty"><div class="icon">📭</div><div>' + 
      (_records.length === 0 ? '暂无下载记录' : '没有匹配的记录') + 
      '</div></div>';
    return;
  }
  
  var html = '<table><thead><tr>';
  html += '<th>#</th><th>姓名</th><th>电话</th><th>公司</th><th>国家</th><th>车型</th><th>时间</th>';
  html += '</tr></thead><tbody>';
  
  filtered.forEach(function(r, i) {
    var time = r.createdAt ? new Date(r.createdAt).toLocaleString('zh-CN') : '-';
    html += '<tr>';
    html += '<td>' + (i + 1) + '</td>';
    html += '<td><strong>' + esc(r.name) + '</strong></td>';
    html += '<td>' + esc(r.phone) + '</td>';
    html += '<td>' + esc(r.company || '-') + '</td>';
    html += '<td>' + esc(r.country || '-') + '</td>';
    html += '<td style="font-family:monospace;font-size:11px;">' + esc(r.model || '-') + '</td>';
    html += '<td style="font-size:11px;white-space:nowrap;">' + time + '</td>';
    html += '</tr>';
  });
  
  html += '</tbody></table>';
  html += '<div style="text-align:center;color:#888;font-size:12px;margin-top:10px;">显示 ' + filtered.length + ' / ' + _records.length + ' 条记录</div>';
  
  document.getElementById('table-container').innerHTML = html;
}

function esc(s) {
  if (!s) return '-';
  s = String(s);
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function toggleAutoRefresh() {
  var checked = document.getElementById('auto-refresh').checked;
  if (checked) {
    _autoRefreshTimer = setInterval(refreshData, 30000);
  } else {
    if (_autoRefreshTimer) { clearInterval(_autoRefreshTimer); _autoRefreshTimer = null; }
  }
}

window.addEventListener('beforeunload', function() {
  if (_autoRefreshTimer) clearInterval(_autoRefreshTimer);
});
</script>
</body>
</html>
